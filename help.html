<head>

    <title>eSakayMo Fare Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://media.discordapp.net/attachments/1471344243585847459/1476204001140670525/360_F_1852476034_Dyw5Ff5GBubLItam6mHXeTbETO7o2nYH.jpg?ex=69a0459c&is=699ef41c&hm=54a2199f86c48c4d948c1068fd489d2b7cfac78f32f0c324ddd670b1849b5c57&=&format=webp&width=801&height=450');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #000000;
        }
        
        .nav-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .nav-left a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-left a:hover {
            color: #64c8ff;
        }
        
        .nav-right {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-book {
            background-color: transparent;
            color: white;
            border: 1px solid white;
        }
        
        .btn-book:hover {
            background-color: white;
            color: #1a4d5c;
        }
        
        .btn-create {
            background-color: #007bff;
            color: white;
        }
        
        .btn-create:hover {
            background-color: #0056b3;
        }
        
        .container {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }
        
        .hero {
            background-color: rgba(110, 180, 200, 0.8);
            padding: 60px 80px;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff9900;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo-text {
            font-size: 32px;
            color: #ff9900;
            font-weight: bold;
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        .highlight {
            color: #ff9900;
            font-weight: bold;
        }
        
        .cta-link {
            display: inline-block;
            margin-top: 20px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        .cta-link:hover {
            background-color: #333;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            font-size: 24px;
            font-weight: bold;
            color: #1a4d5c;
            margin-bottom: 15px;
        }
        
        .modal-body {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .modal-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #000;
        }
        
        .modal-button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

</body>
