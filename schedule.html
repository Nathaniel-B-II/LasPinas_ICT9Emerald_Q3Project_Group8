<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Burgerville Fare Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://media.discordapp.net/attachments/1471344243585847459/1476204001140670525/360_F_1852476034_Dyw5Ff5GBubLItam6mHXeTbETO7o2nYH.jpg?ex=69a0459c&is=699ef41c&hm=54a2199f86c48c4d948c1068fd489d2b7cfac78f32f0c324ddd670b1849b5c57&=&format=webp&width=801&height=450');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #000000;
        }
        
        .nav-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .nav-left a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-left a:hover {
            color: #64c8ff;
        }
        
        .nav-right {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-book {
            background-color: transparent;
            color: white;
            border: 1px solid white;
        }
        
        .btn-book:hover {
            background-color: white;
            color: #1a4d5c;
        }
        
        .btn-create {
            background-color: #007bff;
            color: white;
        }
        
        .btn-create:hover {
            background-color: #0056b3;
        }
        
        .container {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 20px;
        }
        
        .hero {
            background-color: rgba(110, 180, 200, 0.8);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            max-width: 700px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff9900;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo-text {
            font-size: 32px;
            color: #ff9900;
            font-weight: bold;
        }
        
        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 30px;
            font-weight: normal;
        }
        
        .highlight {
            color: #ff9900;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.9);
            margin-top: 20px;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            color: #333;
        }
        
        th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="farematrix.html">Fare Matrix</a>
            <a href="schedule.html">Schedule</a>
            <a href="help.html">Help</a>
        </div>
        <div class="nav-right">
            <a href="booknow.html" class="btn btn-book">Book Now</a>
            <a href="createaccount.html" class="btn btn-create">Create Account</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="hero">
            <div class="logo-section">
                <div class="logo">🍔</div>
                <div class="logo-text">Burgerville</div>
            </div>
            <h1>Transport <span class="highlight">Schedule</span></h1>
            
            <table>
                <tr>
                    <th>Route</th>
                    <th>Departure</th>
                    <th>Arrival</th>
                </tr>
                <tr>
                    <td>North Ave. → Taft</td>
                    <td>7:00 AM</td>
                    <td>8:30 AM</td>
                </tr>
                <tr>
                    <td>Taft → North Ave.</td>
                    <td>9:00 AM</td>
                    <td>10:30 AM</td>
                </tr>
                <tr>
                    <td>North Ave. → Cubao</td>
                    <td>11:00 AM</td>
                    <td>11:45 AM</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
