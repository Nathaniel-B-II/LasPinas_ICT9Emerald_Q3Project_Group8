      color: #ffcc00;
    }
    h2 {

    }
    table {
      width: 100%;

    }
    th, td {
      border: 1px solid #fff;
      padding: 12px;
      text-align: center;
      color: #fff;
    }
    th {
      background: rgba(0,195,255,0.4);
      font-weight: bold;
    }
    footer {
