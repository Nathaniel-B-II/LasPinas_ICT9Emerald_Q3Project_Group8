<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://media.discordapp.net/attachments/1471344243585847459/1476204001140670525/360_F_1852476034_Dyw5Ff5GBubLItam6mHXeTbETO7o2nYH.jpg?ex=69a0459c&is=699ef41c&hm=54a2199f86c48c4d948c1068fd489d2b7cfac78f32f0c324ddd670b1849b5c57&=&format=webp&width=801&height=450') no-repeat center center fixed; 
      background-size: cover;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: rgba(0,0,0,0.85);
      padding: 30px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .links a {
      margin-right: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    nav .links a:hover {
      color: #00c3ff;
    }
    nav .actions button {
      margin-left: 10px;
      padding: 8px 15px;
      background: #00c3ff;
      border: none;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    nav .actions button:hover {
      background: #0099cc;
    }
    .overlay {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 50;
    }
    .form-container, .confirmed {
      background: rgba(9, 120, 161, 0.782);
      padding: 50px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      box-shadow: 10 10 0px rgba(0,195,255,0.5);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }
    .active {
      opacity: 1;
      transform: translateY(0);
    }
    .logo {
      margin-bottom: 20px;
    }
    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
    .logo h1 {
      margin-top: 10px;
      font-size: 24px;
      color: #ffcc00;
    }
    h2 {
      margin-bottom: 20px;
      color: #ffcc00;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #00c3ff;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #0099cc;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.7);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="links">
      <a href="#">Home</a>
      <a href="#">Fare Matrix</a>
      <a href="#">Schedule</a>
      <a href="#">Help</a>
    </div>
    <div class="actions">
      <button>Book Now</button>
      <button>Create Account</button>
    </div>
  </nav>

  <div class="overlay">
    <!-- Create Account Form -->
    <div class="form-container active" id="createAccount">
      <!-- Logo Section -->
      <div class="logo">
        <img src="download.jpg" alt="Logo"> <!-- Replace with your logo file -->
        <h1>Transport Guide</h1>
      </div>

      <h2>Create Account</h2>
      <form id="accountForm">
        <div class="form-group"><input type="text" placeholder="Username" required></div>
        <div class="form-group"><input type="email" placeholder="Email" required></div>
        <div class="form-group"><input type="password" placeholder="Password" required></div>
        <button class="btn" type="submit">Submit</button>
      </form>
    </div>

    <!-- Account Confirmed Message -->
    <div class="confirmed" id="confirmedMessage">
      <h2>Account Confirmed!</h2>
      <p>Your account has been successfully created.</p>
    </div>
  </div>

  <footer>
    Student Name | Grade & Section ©2026
  </footer>

  <script>
    const form = document.getElementById('accountForm');
    const createAccount = document.getElementById('createAccount');
    const confirmedMessage = document.getElementById('confirmedMessage');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      createAccount.classList.remove('active');
      setTimeout(() => {
        createAccount.style.display = 'none';
        confirmedMessage.style.display = 'block';
        confirmedMessage.classList.add('active');
      }, 600);
    });
  </script>
</body>
</html>
