<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSakayMo Fare Guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://media.discordapp.net/attachments/1471344243585847459/1476204001140670525/360_F_1852476034_Dyw5Ff5GBubLItam6mHXeTbETO7o2nYH.jpg?ex=69a0459c&is=699ef41c&hm=54a2199f86c48c4d948c1068fd489d2b7cfac78f32f0c324ddd670b1849b5c57&=&format=webp&width=801&height=450');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #000000;
        }
        
        .nav-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .nav-left a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-left a:hover {
            color: #64c8ff;
        }
        
        .nav-right {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn-book {
            background-color: transparent;
            color: white;
            border: 1px solid white;
        }
        
        .btn-book:hover {
            background-color: white;
            color: #1a4d5c;
        }
        
        .btn-create {
            background-color: #007bff;
            color: white;
        }
        
        .btn-create:hover {
            background-color: #0056b3;
        }
        
        .container {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
        }
        
        .hero {
            background-color: rgba(110, 180, 200, 0.8);
            padding: 60px 80px;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff9900;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo-text {
            font-size: 32px;
            color: #ff9900;
            font-weight: bold;
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        .highlight {
            color: #ff9900;
            font-weight: bold;
        }
        
        .cta-link {
            display: inline-block;
            margin-top: 20px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        .cta-link:hover {
            background-color: #333;
            color: white;
        }
        
        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            position: relative;
            z-index: 15;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 60px;
            width: 100%;
            height: calc(100vh - 120px);
            background: linear-gradient(135deg, rgba(110, 180, 200, 0.9), rgba(100, 170, 190, 0.9));
            overflow: hidden;
        }
        
        .modal-content {
            background-color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            border-radius: 10px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.4);
        }
        
        .modal-header {
            font-size: 24px;
            font-weight: bold;
            color: #1a4d5c;
            margin-bottom: 15px;
        }
        
        .modal-body {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .modal-close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #000;
        }
        
        .modal-button {
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .modal-button:hover {
            background-color: #0056b3;
        }
        
        .booking-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        .book-button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .book-button:hover {
            background-color: #0056b3;
        }
        
        .book-button:active {
            background-color: #0047a3;
        }
        
        .confirmed {
            text-align: center;
        }
        
        .confirmed h2 {
            color: rgb(27, 27, 27);
            font-size: 28px;
            margin-bottom: 20px;
        }
        
        .confirmed p {
            color: rgb(27, 27, 27);
            font-size: 15px;
            margin-bottom: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="farematrix.html">Fare Matrix</a>
            <a href="schedule.html">Schedule</a>
            <a href="help.html">Help</a>
        </div>
        <div class="nav-right">
            <a href="booknow.html" class="btn btn-book">Book Now</a>
            <a href="createaccount.html" class="btn btn-create">Create Account</a>
        </div>
    </nav>
    
    <h2 style="color: white; text-align: center; margin-top: 50px;">Book Your Ride Now</h2>
    
    <div class="booking-container">
        <form id="bookingForm">
            <div class="form-group">
                <label for="route">Select Route:</label>
                <select id="route" required>
                    <option value="">-- Choose a Route --</option>
                    <option value="route1">Burgervilla -> Racoon City</option>
                    <option value="route2">Gooseman Street -> Burgevilla</option>
                    <option value="route3">Riverdrive -> Downtown</option>

                </select>
            </div>
            
            <div class="form-group">
                <label for="date">Select Date:</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label for="time">Select Time:</label>
                <input type="time" id="time" required>
            </div>
            
            <button type="submit" class="book-button">Book Now</button>
        </form>
    </div>
    
    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="confirmed" id="confirmedMessage">
                <h2>Booking Confirmed!!!</h2>
                <p><strong>Route:</strong> <span id="confirmRoute"></span></p>
                <p><strong>Date:</strong> <span id="confirmDate"></span></p>
                <p><strong>Time:</strong> <span id="confirmTime"></span></p>
                <p>Your booking has been successfully completed</p>
            </div>
            <button class="modal-button" onclick="closeModal()">Close</button>
        </div>
    </div>

    
    <script>
        const dateInput = document.getElementById('date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);
        
      
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const route = document.getElementById('route').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            
     
            const routeSelect = document.getElementById('route');
            const routeName = routeSelect.options[routeSelect.selectedIndex].text;
            

            const dateObj = new Date(date);
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
  
            document.getElementById('confirmRoute').textContent = routeName;
            document.getElementById('confirmDate').textContent = formattedDate;
            document.getElementById('confirmTime').textContent = time;
            
            document.getElementById('confirmationModal').style.display = 'block';
            

            this.reset();
        });
        

        function closeModal() {
            document.getElementById('confirmationModal').style.display = 'none';
        }
        
 
        window.onclick = function(event) {
            const modal = document.getElementById('confirmationModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
